<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ops Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Raleway:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--red:#EA1D2C;--red-dark:#C41420;--sand:#F5E9DA;--peach:#FFDEBB;--bg:#FAF8F5;--card:#FFF;--border:#F0EDE8;--t1:#1A1A1A;--t2:#6B7280;--t3:#9CA3AF;--green:#10B981;--yellow:#F59E0B;--blue:#3B82F6;--purple:#8B5CF6;--orange:#F97316;--r:16px;--rs:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',-apple-system,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
h1,h2,h3{font-family:'Raleway',sans-serif}

.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FAF8F5,#F5E9DA)}
.login-box{background:#fff;border-radius:24px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.08);text-align:center}
.login-logo{font-size:40px;margin-bottom:8px}
.login-box h2{font-size:22px;font-weight:800;color:var(--red);margin-bottom:4px}
.login-box p{font-size:13px;color:var(--t2);margin-bottom:24px}
.login-input{width:100%;padding:14px 16px;border-radius:12px;border:1px solid #E5E7EB;font-size:14px;font-family:inherit;outline:none;margin-bottom:12px;text-align:center}
.login-input:focus{border-color:var(--red)}
.login-btn{width:100%;padding:14px;border-radius:12px;border:none;background:var(--red);color:#fff;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit}
.login-error{color:var(--red);font-size:12px;margin-top:8px;display:none}

.header{background:linear-gradient(135deg,var(--red),var(--red-dark));padding:24px 32px 18px;color:#fff}
.header-top{display:flex;justify-content:space-between;align-items:center}
.header-title{display:flex;align-items:center;gap:12px}
.header h1{font-size:22px;font-weight:800;letter-spacing:-.02em}
.header p{font-size:13px;opacity:.85;margin-top:2px}
.header-actions{display:flex;gap:8px}
.header-btn,.logout-btn{padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit}
.logout-btn{border:none;background:rgba(255,255,255,.15)}
.sync-status{font-size:10px;opacity:.7;margin-top:4px}

.nav{display:flex;gap:4px;padding:12px 24px;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto}
.nav-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rs);border:none;cursor:pointer;font-size:13px;font-weight:600;background:transparent;color:var(--t2);font-family:inherit;white-space:nowrap;transition:all .2s}
.nav-btn.active{background:var(--red);color:#fff}
.nav-btn:hover:not(.active){background:#F3F4F6}

.content{padding:20px 24px;max-width:1100px;margin:0 auto}

.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.summary-card{background:var(--card);border-radius:var(--r);padding:18px 14px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--border)}
.summary-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:6px;font-size:16px}
.summary-value{font-size:26px;font-weight:700}
.summary-label{font-size:11px;color:var(--t2);font-weight:500;margin-top:2px}

.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.dash-card{background:var(--card);border-radius:var(--r);padding:20px;border:1px solid var(--border)}
.dash-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.dash-card-header h3{font-size:14px;font-weight:700}
.dash-link{background:none;border:none;cursor:pointer;font-size:12px;color:var(--red);font-weight:600;font-family:inherit}
.full-width{grid-column:1/-1}

.list-item{padding:10px 0;border-bottom:1px solid #F9F7F4;display:flex;align-items:center;gap:10px}
.list-item:last-child{border-bottom:none}
.list-item input[type=checkbox]{accent-color:var(--red);cursor:pointer;width:16px;height:16px;flex-shrink:0}
.item-content{flex:1;min-width:0}
.item-title{font-size:13px;font-weight:600}
.item-title.done{text-decoration:line-through;color:var(--t3)}
.item-sub{font-size:11px;color:var(--t3);margin-top:2px}
.item-badges{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap}

.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.b-red{background:#EA1D2C18;color:var(--red)}.b-green{background:#10B98118;color:var(--green)}.b-yellow{background:#F59E0B18;color:var(--yellow)}.b-blue{background:#3B82F618;color:var(--blue)}.b-purple{background:#8B5CF618;color:var(--purple)}.b-gray{background:#9CA3AF18;color:var(--t3)}.b-orange{background:#F9731618;color:var(--orange)}

.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.filters{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;background:#F3F4F6;color:var(--t2);transition:all .2s}
.filter-btn.active{background:var(--red);color:#fff}
.add-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rs);border:none;background:var(--red);color:#fff;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}

.entry-card{background:var(--card);border-radius:14px;padding:16px 20px;border:1px solid var(--border);margin-bottom:10px;transition:box-shadow .2s}
.entry-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.entry-card.overdue{border-color:#FCA5A5}
.entry-card.urgent{border-left:4px solid var(--red)}
.entry-top{display:flex;justify-content:space-between;align-items:center}
.entry-meta{font-size:12px;color:var(--t2);display:flex;gap:16px;margin-top:4px;flex-wrap:wrap}
.entry-actions{display:flex;gap:4px}
.icon-btn{background:none;border:none;cursor:pointer;padding:6px;border-radius:6px;font-size:14px}
.icon-btn:hover{background:#F3F4F6}

.agenda-section{margin-top:10px;padding:10px 14px;background:#FAFAF9;border-radius:10px;border:1px solid #F0EDE8}
.agenda-title{font-size:11px;font-weight:700;color:var(--t2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.agenda-item{display:flex;align-items:flex-start;gap:6px;padding:4px 0;font-size:12px}
.agenda-item input[type=checkbox]{margin-top:2px;accent-color:var(--red);cursor:pointer}
.agenda-text{flex:1}
.agenda-text.done{text-decoration:line-through;color:var(--t3)}
.add-agenda{display:flex;gap:6px;margin-top:6px}
.add-agenda input{flex:1;padding:6px 10px;border-radius:8px;border:1px solid #E5E7EB;font-size:12px;font-family:inherit;outline:none}
.add-agenda button{padding:6px 12px;border-radius:8px;border:none;background:var(--red);color:#fff;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit}

.day-sep{display:flex;align-items:center;gap:12px;margin:20px 0 12px;font-size:13px;font-weight:700}
.day-sep::after{content:'';flex:1;height:1px;background:var(--border)}
.day-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;background:var(--sand);color:#92400E}
.day-today{background:var(--red);color:#fff}

.progress-track{height:6px;border-radius:3px;background:#F3F4F6;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--red),#F97316);transition:width .3s}

.project-card{background:var(--card);border-radius:var(--r);padding:20px;border:1px solid var(--border);margin-bottom:16px}
.project-name{font-weight:700;font-size:15px;margin-bottom:6px}

.transversal-banner{background:linear-gradient(135deg,#1E1B4B,#312E81);border-radius:16px;padding:20px 24px;color:#fff;margin-bottom:24px}
.transversal-banner h3{font-size:16px;font-weight:800;margin-bottom:4px}
.transversal-banner>p{font-size:12px;opacity:.8;margin-bottom:14px}
.frentes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.frente-card{background:rgba(255,255,255,.1);border-radius:12px;padding:14px;border:1px solid rgba(255,255,255,.15)}
.frente-card h4{font-size:12px;font-weight:700;margin-bottom:4px}
.frente-card p{font-size:11px;opacity:.85;line-height:1.4}

.team-section{margin-bottom:16px}
.team-header{display:flex;align-items:center;gap:10px;padding:14px 18px;background:#fff;border-radius:14px 14px 0 0;border:1px solid var(--border);border-bottom:3px solid var(--red);cursor:pointer}
.team-header h3{font-size:15px;font-weight:700;flex:1}
.team-body{background:#fff;border:1px solid var(--border);border-top:none;border-radius:0 0 14px 14px;padding:16px 18px}
.team-body.collapsed{display:none}
.subsection-title{font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #F3F4F6}

.backlog-card{background:#FFFBEB;border:1px solid #FDE68A;border-radius:12px;padding:14px 16px;margin-bottom:8px}
.backlog-card h4{font-size:13px;font-weight:700;color:#92400E;margin-bottom:2px}
.backlog-card p{font-size:11px;color:#A16207}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;visibility:hidden;transition:all .2s}
.modal-overlay.open{opacity:1;visibility:visible}
.modal{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);transform:translateY(20px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-header h3{font-size:18px;font-weight:700}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--t3)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:#4B5563;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border-radius:var(--rs);border:1px solid #E5E7EB;font-size:13px;outline:none;font-family:inherit;background:#fff}
.field textarea{min-height:60px;resize:vertical}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn-cancel{padding:10px 20px;border-radius:var(--rs);border:1px solid #E5E7EB;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:var(--t2);font-family:inherit}
.btn-save{padding:10px 20px;border-radius:var(--rs);border:none;background:var(--red);color:#fff;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}

.config-panel{padding:16px 24px;background:#FFF7ED;border-bottom:1px solid #FDE68A;display:none}
.config-panel.open{display:block}
.config-panel input{padding:8px 12px;border-radius:8px;border:1px solid #E5E7EB;font-size:12px;font-family:inherit;width:100%;max-width:500px;outline:none}
.config-panel button{padding:8px 16px;border-radius:8px;border:none;background:var(--red);color:#fff;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;margin-left:8px}
.config-panel label{font-size:12px;font-weight:600;color:#92400E;display:block;margin-bottom:6px}

/* Date filter bar */
.date-filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}

.empty{text-align:center;padding:40px;color:var(--t3);font-size:13px}

@media(max-width:768px){
  .summary-grid{grid-template-columns:repeat(2,1fr)}
  .dash-grid,.frentes-grid{grid-template-columns:1fr}
  .content{padding:16px}.header{padding:20px 16px 16px}
  .section-header{flex-direction:column;align-items:stretch}
}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">📊</div>
    <h2>Ops Dashboard</h2>
    <p>Central de gestão operacional</p>
    <input class="login-input" type="password" id="pwInput" placeholder="Digite a senha de acesso" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="loginError">Senha incorreta. Tente novamente.</div>
  </div>
</div>

<div id="app" style="display:none">
<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title"><span style="font-size:24px">📊</span><h1>Ops Dashboard</h1></div>
      <p>Central de gestão operacional</p>
      <div class="sync-status" id="syncStatus">☁️ Conectando ao Firebase...</div>
    </div>
    <div class="header-actions">
      <button class="header-btn" onclick="syncCalendar()">🔄 Sincronizar</button>
      <button class="header-btn" onclick="toggleConfig()">⚙️</button>
      <button class="logout-btn" onclick="doLogout()">Sair</button>
    </div>
  </div>
</div>
<div class="config-panel" id="configPanel">
  <label>URL do Google Apps Script</label>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <input id="apiUrlInput" placeholder="https://script.google.com/macros/s/SEU_ID/exec">
    <button onclick="saveApiUrl()">Salvar</button>
  </div>
  <div style="font-size:11px;color:#92400E;margin-top:6px">Cole a URL e salve. Depois clique em 🔄 Sincronizar.</div>
</div>
<div class="nav">
  <button class="nav-btn active" onclick="go('dashboard')" data-tab="dashboard">📊 Visão Geral</button>
  <button class="nav-btn" onclick="go('meetings')" data-tab="meetings" data-private="1">📅 Agenda</button>
  <button class="nav-btn" onclick="go('tasks')" data-tab="tasks">✅ Demandas</button>
  <button class="nav-btn" onclick="go('alignments')" data-tab="alignments" data-private="1">🤝 Alinhamentos</button>
  <button class="nav-btn" onclick="go('teams')" data-tab="teams">👥 Times</button>
  <button class="nav-btn" onclick="go('projects')" data-tab="projects">🚀 Big Projects</button>
  <button class="nav-btn" onclick="go('backlog')" data-tab="backlog" data-private="1">💡 Backlog</button>
</div>
<div class="content" id="mc"></div>
</div>

<div class="modal-overlay" id="mo" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header"><h3 id="mt">Adicionar</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div id="mb"></div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-save" onclick="saveItem()">💾 Salvar</button></div>
  </div>
</div>

<!-- Firebase SDK (compat mode — funciona com script tags, sem build tools) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════

  authDomain: "laria-a557f.firebaseapp.com",

firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var dbRef = db.ref('ops_dashboard');
var firebaseReady = false;
var savePending = false;

// ═══════════════════════════════════════════════════════════════
// COLE SUA URL DO APPS SCRIPT AQUI (opcional — também pode configurar pelo ⚙️)
// ═══════════════════════════════════════════════════════════════
var DEFAULT_API_URL = 'https://script.google.com/a/macros/ifood.com.br/s/AKfycbw4QVyZawV5k4DgiEqJAyJARH9Jin0FY6J7pcYMd49yGhibmoAnm4uNftLvGkmBcjMh/exec';

// ═══ AUTH ═══
var role=null;
function doLogin(){var p=document.getElementById('pwInput').value;if(p==='Lariluca0111*'){role='admin';showApp()}else if(p==='SOPSCS2026'){role='leader';showApp()}else{document.getElementById('loginError').style.display='block';document.getElementById('pwInput').value=''}}
function showApp(){document.getElementById('loginScreen').style.display='none';document.getElementById('app').style.display='block';if(role==='leader'){document.querySelectorAll('[data-private]').forEach(function(e){e.style.display='none'});document.querySelector('[onclick*="toggleConfig"]').style.display='none'}loadApiUrl();R();if(API_URL)syncCalendar()}
function doLogout(){role=null;document.getElementById('loginScreen').style.display='flex';document.getElementById('app').style.display='none';document.getElementById('pwInput').value='';document.getElementById('loginError').style.display='none'}

// ═══ CALENDAR SYNC (JSONP) ═══
var API_URL='';
function loadApiUrl(){API_URL=DEFAULT_API_URL;document.getElementById('apiUrlInput').value=API_URL}
function saveApiUrl(){API_URL=document.getElementById('apiUrlInput').value.trim();document.getElementById('configPanel').classList.remove('open');if(API_URL)syncCalendar()}
function toggleConfig(){document.getElementById('configPanel').classList.toggle('open')}
function updateSync(msg){document.getElementById('syncStatus').textContent=msg}

function calendarCallback(result){
  if(result&&result.success){
    var existing={};D.meetings.forEach(function(m){var k=m.title+'|'+m.date+'|'+m.time;existing[k]={agenda:m.agenda||[],done:m.done||false}});
    var cal=[];
    for(var i=0;i<result.events.length;i++){
      var e=result.events[i];
      if(e.time==='all-day')continue;
      var k=e.title+'|'+e.date+'|'+e.time;
      var prev=existing[k]||{agenda:[],done:false};
      cal.push({id:i+1,title:e.title,date:e.date,time:e.time,end:e.endTime||'',type:e.type||'Outro',who:'',done:prev.done,agenda:prev.agenda,fromCal:true});
    }
    D.meetings=cal;save();
    updateSync('✅ '+result.total+' eventos · '+new Date().toLocaleTimeString('pt-BR'));
  }else{updateSync('❌ '+(result?result.error:'Erro'))}
  R();
}

function syncCalendar(){
  if(!API_URL){toggleConfig();updateSync('⚠️ Configure a URL');return}
  updateSync('🔄 Sincronizando...');
  var old=document.getElementById('jsonpScript');if(old)old.remove();
  var s=document.createElement('script');s.id='jsonpScript';
  s.src=API_URL+'?callback=calendarCallback&daysBack=7&daysForward=60';
  s.onerror=function(){updateSync('❌ Erro de conexão')};
  document.head.appendChild(s);
}

    {id:3,title:'1:1 com Joy',date:'2026-05-26',time:'14:45',end:'15:30',type:'1:1',who:'',done:false,agenda:[]},

    {id:6,title:'1:1 com Mai',date:'2026-05-27',time:'09:15',end:'10:00',type:'1:1',who:'',done:false,agenda:[]},
    {id:7,title:'1:1 com Duda',date:'2026-05-27',time:'10:15',end:'10:45',type:'1:1',who:'',done:false,agenda:[]},
    {id:8,title:'1:1 com Guilherme',date:'2026-05-27',time:'15:00',end:'15:30',type:'1:1',who:'',done:false,agenda:[]},
    {id:9,title:'1:1 com Martin',date:'2026-05-27',time:'15:30',end:'16:00',type:'1:1',who:'',done:false,agenda:[]},
    {id:10,title:'Wall Face Novos Negócios',date:'2026-05-27',time:'16:30',end:'18:00',type:'Fórum',who:'',done:false,agenda:[]},
    {id:11,title:'1:1 com Douglas',date:'2026-05-28',time:'11:00',end:'11:30',type:'1:1',who:'',done:false,agenda:[]},
    {id:12,title:'Growth Self | Jornada Self',date:'2026-05-28',time:'14:00',end:'15:00',type:'Estratégico',who:'',done:false,agenda:[]},
    {id:13,title:'Weekly de Rentabilidade',date:'2026-05-28',time:'16:00',end:'17:00',type:'Recorrente',who:'',done:false,agenda:[]},

// ═══ FIREBASE SAVE / LOAD ═══
function save(){
  // Salva no Firebase (nuvem — todos veem)
  dbRef.set(D).then(function(){
    updateSaveStatus('☁️ Salvo');
  }).catch(function(err){
    console.error('Firebase save error:', err);
    updateSaveStatus('⚠️ Erro ao salvar');
  });
}

function updateSaveStatus(msg){
  var el=document.getElementById('syncStatus');
  if(el){
    var cur=el.textContent;
    // Não sobrescreve mensagem de sync do calendário se for recente
    if(cur.indexOf('eventos')>-1) return;
    el.textContent=msg;
    setTimeout(function(){if(el.textContent===msg)el.textContent=''},3000);
  }
}

// Listener em tempo real: qualquer mudança no Firebase atualiza o dashboard
dbRef.on('value', function(snapshot){
  var data = snapshot.val();
  if(data){
    // Garante que todos os arrays existam (Firebase remove arrays vazios)
    D.meetings = data.meetings || [];
    D.tasks = data.tasks || [];
    D.alignments = data.alignments || [];
    D.projects = data.projects || [];
    D.crmCS = data.crmCS || [];
    D.backlog = data.backlog || [];
    firebaseReady = true;
    if(role) R(); // Só re-renderiza se logado
  } else {
    // Primeiro acesso: popula o Firebase com dados default
    firebaseReady = true;
    dbRef.set(DEFAULT_DATA);
  }
});

// ═══ HELPERS ═══
var WD={0:'Dom',1:'Seg',2:'Ter',3:'Qua',4:'Qui',5:'Sex',6:'Sáb'};
function fd(d){if(!d)return'';var p=d.split('-');return p[2]+'/'+p[1]}
function fdf(d){if(!d)return'';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
function du(d){if(!d)return null;return Math.ceil((new Date(d)-new Date())/(864e5))}
function dow(d){return WD[new Date(d+'T12:00:00').getDay()]}
function today(){return new Date().toISOString().split('T')[0]}
function addDays(d,n){var dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().split('T')[0]}
function B(l,c){return'<span class="badge b-'+c+'">'+l+'</span>'}
function SB(s){var m={pendente:'yellow','em andamento':'blue','concluído':'green',confirmado:'green','não iniciado':'gray'};return B(s,m[s]||'gray')}
function PB(p){var m={alta:'red',média:'yellow',baixa:'green'};return B(p,m[p]||'gray')}
function TB(t){var m={'1:1':'blue',Recorrente:'purple',Alinhamento:'yellow',Estratégico:'red',Fórum:'purple',Operacional:'yellow',Cultura:'green',Entrevista:'gray',Outro:'gray'};return B(t,m[t]||'gray')}
function E(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function nid(arr){return Math.max(0,...arr.map(function(i){return i.id}))+1}

// Date range filter helper
function getDateEnd(){
  var t=today();
  switch(dateRange){
    case'hoje':return t;
    case'hoje3':return addDays(t,3);
    case'semana':return addDays(t,6);
    case'quinzena':return addDays(t,13);
    case'mes':return addDays(t,29);
    default:return'2099-12-31';
  }
}
function filterByDate(arr,dateField){
  if(dateRange==='todos')return arr;
  var t=today(),end=getDateEnd();
  return arr.filter(function(x){return x[dateField]>=t&&x[dateField]<=end});
}

function renderDateFilter(){
  var opts=[{k:'hoje',l:'Hoje'},{k:'hoje3',l:'Hoje + 3 dias'},{k:'semana',l:'Semana'},{k:'quinzena',l:'Quinzena'},{k:'mes',l:'Mês'},{k:'todos',l:'Todos'}];
  return'<div class="date-filter-bar">'+opts.map(function(o){
    return'<button class="filter-btn '+(dateRange===o.k?'active':'')+'" onclick="dateRange=\''+o.k+'\';R()">'+o.l+'</button>';
  }).join('')+'</div>';
}

function togglePauta(mid,idx){var m=D.meetings.find(function(x){return x.id===mid});if(m&&m.agenda[idx]!==undefined){m.agenda[idx].d=!m.agenda[idx].d;save();R()}}
function addPauta(mid){var inp=document.getElementById('pa-'+mid);if(!inp||!inp.value.trim())return;var m=D.meetings.find(function(x){return x.id===mid});if(m){m.agenda.push({t:inp.value.trim(),d:false});save();R()}}
function rmPauta(mid,idx){var m=D.meetings.find(function(x){return x.id===mid});if(m){m.agenda.splice(idx,1);save();R()}}
function paKey(e,mid){if(e.key==='Enter')addPauta(mid)}

function renderPautas(m){
  var h='<div class="agenda-section"><div class="agenda-title">📋 Pautas</div>';
  if(!m.agenda||m.agenda.length===0)h+='<div style="font-size:11px;color:var(--t3);padding:4px 0">Nenhuma pauta</div>';
  else m.agenda.forEach(function(a,i){

  });
  h+='<div class="add-agenda"><input id="pa-'+m.id+'" placeholder="Adicionar pauta..." onkeydown="paKey(event,'+m.id+')"><button onclick="addPauta('+m.id+')">+</button></div></div>';
  return h;
}

      +(days!==null&&days>=0&&days<=2?'<span style="color:var(--yellow);font-weight:600">⏰ '+days+'d</span>':'')
      +'</div></div></div>'
      +(role==='admin'?'<div class="entry-actions"><button class="icon-btn" onclick="openEdit(\'tasks\','+t.id+')">✏️</button><button class="icon-btn" onclick="delItem(\'tasks\','+t.id+')">🗑️</button></div>':'')
      +'</div></div>';
  });
  return h;
}

function rAlign(){
  var sts=['todos','pendente','agendado','concluído'];
  var sorted=D.alignments.slice().sort(function(a,b){var u={alta:0,média:1,baixa:2};return(u[a.urgency]||9)-(u[b.urgency]||9)});
  if(filter!=='todos')sorted=sorted.filter(function(a){return a.status===filter});

  var h='<div class="section-header">'+renderFilters(sts)+'<button class="add-btn" onclick="openAdd(\'alignments\')">➕ Novo alinhamento</button></div>';
  if(sorted.length===0)return h+'<div class="empty">Nenhum alinhamento encontrado</div>';

  sorted.forEach(function(a){
    var ud=a.urgency==='alta'?'🔴':a.urgency==='média'?'🟡':'🟢';
    h+='<div class="entry-card"><div class="entry-top"><div style="display:flex;align-items:center;gap:10px;flex:1">'
      +'<input type="checkbox" '+(a.done?'checked':'')+' onchange="toggleAlign('+a.id+')" style="width:18px;height:18px;accent-color:var(--red)">'
      +'<div><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span>'+ud+'</span><span class="item-title '+(a.done?'done':'')+'">'+E(a.person)+'</span>'+SB(a.status)+'</div>'
      +'<div style="font-size:13px;color:#374151;margin-top:2px">'+E(a.topic)+'</div>'
      +'<div class="entry-meta"><span>📅 até '+fdf(a.dueDate)+'</span></div>'
      +(a.context?'<div style="font-size:11px;color:var(--t3);margin-top:4px">'+E(a.context)+'</div>':'')
      +'</div></div>'
      +'<div class="entry-actions"><button class="icon-btn" onclick="openEdit(\'alignments\','+a.id+')">✏️</button><button class="icon-btn" onclick="delItem(\'alignments\','+a.id+')">🗑️</button></div>'
      +'</div></div>';
  });
  return h;
}

function rTeams(){
  var h='<div style="margin-bottom:16px"><h3 style="font-size:16px;font-weight:700">Gestão por Times</h3></div>';
  TEAMS.forEach(function(team){
    var tp=D.projects.filter(function(p){return p.team===team.id});
    h+='<div class="team-section"><div class="team-header" onclick="this.nextElementSibling.classList.toggle(\'collapsed\')">'
      +'<span style="font-size:20px">'+team.icon+'</span><h3>'+team.name+'</h3>'
      +'<span style="font-size:11px;color:var(--t3)">'+tp.length+' projeto(s)</span><span style="font-size:14px;color:var(--t3)">▼</span></div>'
      +'<div class="team-body">';
    if(tp.length>0){
      h+='<div class="subsection-title">🚀 Projetos estratégicos</div>';
      tp.forEach(function(p){
        h+='<div style="background:#FAFAF9;border-radius:10px;padding:12px 14px;border:1px solid #F0EDE8;margin-bottom:8px">'
          +'<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:700;font-size:13px">'+E(p.name)+'</span>'
          +(role==='admin'?'<button class="icon-btn" onclick="openEdit(\'projects\','+p.id+')">✏️</button>':'')+'</div>'
          +'<div style="font-size:11px;color:var(--t2);margin-top:4px">'+E(p.desc)+'</div>'
          +'<div style="display:flex;gap:6px;margin-top:6px;align-items:center">'+SB(p.status)+'<span style="font-size:10px;color:var(--t3)">'+p.progress+'%</span></div>'
          +'<div class="progress-track" style="margin-top:6px"><div class="progress-fill" style="width:'+p.progress+'%"></div></div>'
          +(p.pendencias?'<div style="margin-top:6px;padding:6px 10px;background:#FEF2F2;border-radius:6px;font-size:11px;color:#991B1B">⚠️ '+E(p.pendencias)+'</div>':'')
          +'</div>';
      });
    }else h+='<div style="padding:12px;font-size:12px;color:var(--t3)">Nenhum projeto mapeado</div>';
    h+='</div></div>';
  });
  return h;
}

function rProj(){
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3 style="font-size:16px;font-weight:700">🚀 Big Projects</h3>'
    +(role==='admin'?'<button class="add-btn" onclick="openAdd(\'projects\')">➕ Novo projeto</button>':'')+'</div>';

  // Projetos por time
  D.projects.forEach(function(p){
    var team=TEAMS.find(function(t){return t.id===p.team});
    h+='<div class="project-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
      +'<div><span class="project-name">'+(team?team.icon+' ':'')+E(p.name)+'</span><br>'+B(team?team.name:'','purple')+' '+SB(p.status)+'</div>'
      +'<div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px;font-weight:700;color:var(--red)">'+p.progress+'%</span>'
      +(role==='admin'?'<button class="icon-btn" onclick="openEdit(\'projects\','+p.id+')">✏️</button><button class="icon-btn" onclick="delItem(\'projects\','+p.id+')">🗑️</button>':'')
      +'</div></div>'
      +'<div class="progress-track" style="margin-bottom:10px"><div class="progress-fill" style="width:'+p.progress+'%"></div></div>'
      +'<div style="font-size:12px;color:var(--t2);line-height:1.6">'+E(p.desc)+'</div>'
      +(p.pendencias?'<div style="margin-top:8px;padding:8px 12px;background:#FEF2F2;border-radius:8px;font-size:11px;color:#991B1B">⚠️ '+E(p.pendencias)+'</div>':'')
      +'</div>';
  });

  // CRM CS dentro de Big Projects
  h+='<div class="transversal-banner"><h3>🔗 Projeto Transversal — CRM CS</h3><p>Iniciativa cross-funcional que impacta todos os times</p><div class="frentes-grid">';
  D.crmCS.forEach(function(f){
    h+='<div class="frente-card"><h4>'+E(f.title)+'</h4><p>'+E(f.desc)+'</p><div style="font-size:10px;opacity:.6;margin-top:6px">👤 '+E(f.owner)+' · '+SB(f.status)+'</div></div>';
  });
  h+='</div></div>';

  return h;
}

function rBack(){
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div><h3 style="font-size:16px;font-weight:700">💡 Backlog de Ideias</h3></div>'
    +'<button class="add-btn" onclick="openAdd(\'backlog\')">➕ Nova ideia</button></div>';
  D.backlog.forEach(function(b){
    h+='<div class="backlog-card"><div style="display:flex;justify-content:space-between"><h4>💡 '+E(b.title)+'</h4><div class="entry-actions"><button class="icon-btn" onclick="openEdit(\'backlog\','+b.id+')">✏️</button><button class="icon-btn" onclick="delItem(\'backlog\','+b.id+')">🗑️</button></div></div><p>'+E(b.desc)+'</p></div>';
  });
  if(D.backlog.length===0)h+='<div class="empty">Nenhuma ideia no backlog</div>';
  return h;
}

// ═══ MODAL / CRUD ═══
function openAdd(sec){editItem=null;editSec=sec;var t={meetings:'Nova Reunião',tasks:'Nova Demanda',alignments:'Novo Alinhamento',projects:'Novo Projeto',backlog:'Nova Ideia'};document.getElementById('mt').textContent=t[sec]||'Adicionar';document.getElementById('mb').innerHTML=formFields(sec,{});document.getElementById('mo').classList.add('open')}
function openEdit(sec,id){var item=D[sec].find(function(i){return i.id===id});if(!item)return;editItem=item;editSec=sec;var t={meetings:'Editar Reunião',tasks:'Editar Demanda',alignments:'Editar Alinhamento',projects:'Editar Projeto',backlog:'Editar Ideia'};document.getElementById('mt').textContent=t[sec]||'Editar';document.getElementById('mb').innerHTML=formFields(sec,item);document.getElementById('mo').classList.add('open')}
function closeModal(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('mo').classList.remove('open');editItem=null;editSec=null}

function V(k,o){return(o&&o[k])||''}
function formFields(sec,it){
  switch(sec){
    case'meetings':return'<div class="field"><label>Título</label><input id="f_title" value="'+E(V('title',it))+'"></div>'
      +'<div class="field-row"><div class="field"><label>Data</label><input type="date" id="f_date" value="'+V('date',it)+'"></div><div class="field"><label>Início</label><input type="time" id="f_time" value="'+V('time',it)+'"></div></div>'
      +'<div class="field-row"><div class="field"><label>Fim</label><input type="time" id="f_end" value="'+V('end',it)+'"></div><div class="field"><label>Tipo</label><select id="f_type">'+['1:1','Recorrente','Alinhamento','Estratégico','Fórum','Operacional','Entrevista','Cultura'].map(function(o){return'<option '+(V('type',it)===o?'selected':'')+'>'+o+'</option>'}).join('')+'</select></div></div>';
    case'tasks':return'<div class="field"><label>Título</label><input id="f_title" value="'+E(V('title',it))+'"></div>'
      +'<div class="field-row"><div class="field"><label>Deadline</label><input type="date" id="f_deadline" value="'+V('deadline',it)+'"></div><div class="field"><label>Prioridade</label><select id="f_priority">'+['alta','média','baixa'].map(function(o){return'<option '+(V('priority',it)===o?'selected':'')+'>'+o+'</option>'}).join('')+'</select></div></div>'
      +'<div class="field-row"><div class="field"><label>Owner</label><input id="f_owner" value="'+E(V('owner',it))+'"></div><div class="field"><label>Categoria</label><input id="f_category" value="'+E(V('category',it))+'"></div></div>'
      +'<div class="field"><label>Status</label><select id="f_status">'+['pendente','em andamento','concluído'].map(function(o){return'<option '+(V('status',it)===o?'selected':'')+'>'+o+'</option>'}).join('')+'</select></div>';
    case'alignments':return'<div class="field"><label>Pessoa</label><input id="f_person" value="'+E(V('person',it))+'"></div>'
      +'<div class="field"><label>Tópico</label><input id="f_topic" value="'+E(V('topic',it))+'"></div>'
      +'<div class="field-row"><div class="field"><label>Urgência</label><select id="f_urgency">'+['alta','média','baixa'].map(function(o){return'<option '+(V('urgency',it)===o?'selected':'')+'>'+o+'</option>'}).join('')+'</select></div><div class="field"><label>Prazo</label><input type="date" id="f_dueDate" value="'+V('dueDate',it)+'"></div></div>'
      +'<div class="field"><label>Status</label><select id="f_status">'+['pendente','agendado','concluído'].map(function(o){return'<option '+(V('status',it)===o?'selected':'')+'>'+o+'</option>'}).join('')+'</select></div>'
      +'<div class="field"><label>Contexto</label><textarea id="f_context">'+E(V('context',it))+'</textarea></div>';
    case'projects':return'<div class="field"><label>Nome</label><input id="f_name" value="'+E(V('name',it))+'"></div>'
      +'<div class="field"><label>Time</label><select id="f_team">'+TEAMS.map(function(t){return'<option value="'+t.id+'" '+(V('team',it)===t.id?'selected':'')+'>'+t.icon+' '+t.name+'</option>'}).join('')+'</select></div>'
      +'<div class="field-row"><div class="field"><label>Status</label><select id="f_status">'+['não iniciado','em andamento','concluído'].map(function(o){return'<option '+(V('status',it)===o?'selected':'')+'>'+o+'</option>'}).join('')+'</select></div><div class="field"><label>Progresso (%)</label><input type="number" min="0" max="100" id="f_progress" value="'+(V('progress',it)||0)+'"></div></div>'
      +'<div class="field"><label>Descrição</label><textarea id="f_desc">'+E(V('desc',it))+'</textarea></div>'
      +'<div class="field"><label>Pendências</label><textarea id="f_pendencias">'+E(V('pendencias',it))+'</textarea></div>';
    case'backlog':return'<div class="field"><label>Título</label><input id="f_title" value="'+E(V('title',it))+'"></div>'
      +'<div class="field"><label>Descrição</label><textarea id="f_desc">'+E(V('desc',it))+'</textarea></div>'
      +'<div class="field"><label>Time</label><input id="f_team" value="'+E(V('team',it))+'" placeholder="transversal, adoção, etc"></div>';
  }
}

function saveItem(){
  var sec=editSec,g=function(id){var el=document.getElementById(id);return el?el.value:''};
  var item={};
  switch(sec){
    case'meetings':item={title:g('f_title'),date:g('f_date'),time:g('f_time'),end:g('f_end'),type:g('f_type'),who:''};if(!editItem){item.done=false;item.agenda=[]}break;
    case'tasks':item={title:g('f_title'),deadline:g('f_deadline'),priority:g('f_priority'),owner:g('f_owner'),category:g('f_category'),status:g('f_status')};if(!editItem)item.done=false;break;
    case'alignments':item={person:g('f_person'),topic:g('f_topic'),urgency:g('f_urgency'),dueDate:g('f_dueDate'),status:g('f_status'),context:g('f_context')};if(!editItem)item.done=false;break;
    case'projects':item={name:g('f_name'),team:g('f_team'),status:g('f_status'),progress:parseInt(g('f_progress'))||0,desc:g('f_desc'),pendencias:g('f_pendencias')};break;
    case'backlog':item={title:g('f_title'),desc:g('f_desc'),team:g('f_team')};break;
  }
  if(editItem){var idx=D[sec].findIndex(function(i){return i.id===editItem.id});if(idx>=0)D[sec][idx]=Object.assign({},D[sec][idx],item)}
  else{item.id=nid(D[sec]);D[sec].push(item)}
  save();closeModal();R();
}

function delItem(sec,id){if(!confirm('Excluir?'))return;D[sec]=D[sec].filter(function(i){return i.id!==id});save();R()}

// Não chama R() aqui — o listener do Firebase faz isso automaticamente quando conectar
</script>
